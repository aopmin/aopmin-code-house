name: Deploy VuePress Blog to Pages

# 触发时机：推送到 blog-page 分支时自动运行
on:
  push:
    branches: [ blog-page ]

# 权限：必须给 pages 读写权限，否则部署失败
permissions:
  contents: read
  pages: write
  id-token: write

# 并发控制：同一分支只保留最新一次构建
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取仓库代码
      - name: Checkout source code
        uses: actions/checkout@v4

      # 2. 安装 Node.js（适配你的 VuePress）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. 安装依赖、打包
      - name: Install dependencies & Build
        run: |
          npm install
          npm run docs:build

      # 4. 上传打包产物（dist 静态文件）
      - name: Upload built static files
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vuepress/dist

      # 5. 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4